name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  go-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download Go dependencies
        run: go mod download

      - name: Build Go
        run: go build ./...

      - name: Test Go
        run: go test ./...

      - name: Vet Go
        run: go vet ./...

      - name: Lint Go
        uses: golangci/golangci-lint-action@v9.3.0
        with:
          version: v2.12.2

  workspace-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17.9-bookworm
        env:
          POSTGRES_USER: nekiro
          POSTGRES_PASSWORD: nekiro-integration-only
          POSTGRES_DB: nekiro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready --username nekiro --dbname nekiro_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download Go dependencies
        run: go mod download

      - name: Run PostgreSQL integration suites
        env:
          NEKIRO_TEST_DATABASE_URL: postgresql://nekiro:nekiro-integration-only@127.0.0.1:5432/nekiro_test?sslmode=disable
        run: |
          go test -tags=integration -count=1 ./apps/control-plane/internal/catalog/postgres
          go test -tags=integration -count=1 ./apps/control-plane/internal/workspace/postgres
          go test -tags=integration -count=1 ./apps/control-plane/internal/workspace/integration

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.16.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck frontend
        run: pnpm typecheck

      - name: Test frontend
        run: pnpm test

      - name: Build frontend
        run: pnpm build

  compose-config:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Compose configuration
        env:
          POSTGRES_USER: compose_config_check
          POSTGRES_PASSWORD: compose-config-check-only
          POSTGRES_DB: compose_config_check
          POSTGRES_PORT: "55432"
          NEKIRO_COMPOSE_DATABASE_URL: postgresql://compose_config_check:compose-config-check-only@postgres:5432/compose_config_check?sslmode=disable
          NEKIRO_DEV_AUTH_PRINCIPALS_JSON: '[{"id":"compose-check","tokenSha256":"aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"}]'
          NEKIRO_INTERNAL_DEV_AUTH_PRINCIPALS_JSON: '[{"id":"compose-router-check","tokenSha256":"bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb"}]'
          CONTROL_PLANE_PORT: "18080"
        run: docker compose --file deploy/compose.yaml config --quiet
