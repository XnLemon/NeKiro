openapi: 3.1.0
info:
  title: NeKiro Router Internal API
  version: 3.0.0
  description: >-
    Router-owned service boundary called only by authenticated Control Plane
    Invocation Dispatch. Agent SDK callers use router-agent.v1.yaml.
servers:
  - url: https://a2a-router.internal.nekiro.dev
    description: Explicit internal destination; no localhost or direct-Agent fallback
paths:
  /internal/v3/invocations:
    post:
      operationId: dispatchInvocation
      summary: Accept an authorized root Invocation and deliver its live result
      description: >-
        Service authentication, strict shape/media/size validation, and initial
        Ledger failure produce no Ledger fact or Agent request. Successful
        created-event commit is acceptance. Router then appends routing and
        re-resolves the exact Card through Control Plane Internal v2. Card auth
        none is supported; every other Card 0.2 type terminalizes from routing
        as AGENT_AUTH_UNSUPPORTED with no Agent request. Clean success is sent
        only after its terminal Ledger commit. A post-side-effect Ledger failure
        is correlated DEPENDENCY_ERROR while durable history remains at its last
        non-terminal fact; no terminal event or retry is fabricated.
      security:
        - serviceBearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResultAccept"
      requestBody:
        required: true
        x-nekiro-max-body-bytes-source: required-router-internal-request-limit
        x-nekiro-limit-default: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DispatchInvocationRequest" }
      responses:
        "200":
          description: JSON result or live SSE result according to request mode
          content:
            application/json:
              schema: { $ref: ../schemas/invocation-result.v1.schema.json }
            text/event-stream:
              schema: { type: string }
              x-sse-data-schema: { $ref: ../schemas/invocation-result-stream-event.v2.schema.json }
              x-nekiro-sse-framing: single-data-line-blank-line-flush
              x-nekiro-max-event-bytes-source: required-router-sse-event-limit
              x-nekiro-limit-default: false
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "406": { $ref: "#/components/responses/NotAcceptable" }
        "409": { $ref: "#/components/responses/Conflict" }
        "413": { $ref: "#/components/responses/PayloadTooLarge" }
        "502": { $ref: "#/components/responses/AgentFailure" }
        "503": { $ref: "#/components/responses/Unavailable" }
        "504": { $ref: "#/components/responses/Timeout" }
  /internal/v3/invocations/{invocationId}:
    get:
      operationId: getRouterInvocation
      security: [{ serviceBearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/InvocationId" }]
      responses:
        "200":
          description: Ordered metadata-only Invocation Event 0.3 facts; a last non-terminal fact is not synthesized as success or failure
          content:
            application/json:
              schema: { type: array, items: { $ref: ../schemas/invocation-event.v0.3.schema.json } }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/Unavailable" }
  /internal/v3/traces/{traceId}:
    get:
      operationId: getRouterTrace
      security: [{ serviceBearerAuth: [] }]
      parameters:
        - in: path
          name: traceId
          required: true
          schema: { $ref: ../schemas/common.v1.schema.json#/$defs/traceId }
      responses:
        "200":
          description: Ordered metadata-only Invocation Event 0.3 facts for a trace
          content:
            application/json:
              schema: { type: array, items: { $ref: ../schemas/invocation-event.v0.3.schema.json } }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/Unavailable" }
components:
  securitySchemes:
    serviceBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque-service-credential
      description: Explicit Control Plane service identity; Agent credentials are rejected before owned behavior.
  parameters:
    ResultAccept:
      in: header
      name: Accept
      required: true
      schema: { type: string, minLength: 1 }
    InvocationId:
      in: path
      name: invocationId
      required: true
      schema: { $ref: ../schemas/common.v1.schema.json#/$defs/invocationId }
  schemas:
    DispatchInvocationRequest:
      type: object
      additionalProperties: false
      required: [invocationId, rootTaskId, traceId, caller, workspaceId, targetAgentId, agentCardVersion, capability, input, stream]
      properties:
        invocationId: { $ref: ../schemas/common.v1.schema.json#/$defs/invocationId }
        rootTaskId: { $ref: ../schemas/common.v1.schema.json#/$defs/taskId }
        traceId: { $ref: ../schemas/common.v1.schema.json#/$defs/traceId }
        caller: { $ref: ../schemas/common.v1.schema.json#/$defs/caller }
        workspaceId: { $ref: ../schemas/common.v1.schema.json#/$defs/workspaceId }
        targetAgentId: { $ref: ../schemas/common.v1.schema.json#/$defs/agentId }
        agentCardVersion: { $ref: ../schemas/common.v1.schema.json#/$defs/semver }
        capability: { $ref: ../schemas/common.v1.schema.json#/$defs/capabilityId }
        input: { $ref: ../schemas/common.v1.schema.json#/$defs/jsonObject }
        stream: { type: boolean }
  responses:
    BadRequest: { description: Invalid service request, x-platform-error-codes: [VALIDATION_ERROR], content: { application/json: { schema: { $ref: ../schemas/platform-error.v4.schema.json } } } }
    Unauthenticated: { description: Missing/wrong service credential, x-platform-error-codes: [UNAUTHENTICATED], content: { application/json: { schema: { $ref: ../schemas/platform-error.v4.schema.json } } } }
    Forbidden: { description: Service request not authorized, x-platform-error-codes: [FORBIDDEN, CAPABILITY_NOT_ALLOWED], content: { application/json: { schema: { $ref: ../schemas/platform-error.v4.schema.json } } } }
    NotFound: { description: Metadata resource not found, x-platform-error-codes: [NOT_FOUND], content: { application/json: { schema: { $ref: ../schemas/platform-error.v4.schema.json } } } }
    NotAcceptable: { description: Result mode mismatch before acceptance, x-platform-error-codes: [NOT_ACCEPTABLE], content: { application/json: { schema: { $ref: ../schemas/platform-error.v4.schema.json } } } }
    Conflict: { description: Canceled/conflicting state, x-platform-error-codes: [CONFLICT, CANCELED], content: { application/json: { schema: { $ref: ../schemas/platform-error.v4.schema.json } } } }
    PayloadTooLarge: { description: Internal request exceeds required configured limit before acceptance, x-platform-error-codes: [PAYLOAD_TOO_LARGE], content: { application/json: { schema: { $ref: ../schemas/platform-error.v4.schema.json } } } }
    AgentFailure: { description: Exact Agent/protocol/auth failure, x-platform-error-codes: [AGENT_AUTH_UNSUPPORTED, AGENT_EXECUTION_FAILED, A2A_PROTOCOL_ERROR], content: { application/json: { schema: { $ref: ../schemas/platform-error.v4.schema.json } } } }
    Unavailable: { description: Route/Agent/dependency unavailable, x-platform-error-codes: [ROUTE_NOT_FOUND, AGENT_UNAVAILABLE, DEPENDENCY_ERROR], content: { application/json: { schema: { $ref: ../schemas/platform-error.v4.schema.json } } } }
    Timeout: { description: Effective deadline expired, x-platform-error-codes: [TIMEOUT], content: { application/json: { schema: { $ref: ../schemas/platform-error.v4.schema.json } } } }
