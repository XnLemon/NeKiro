openapi: 3.1.0
info:
  title: NeKiro Control Plane API
  version: 2.0.0
  description: >-
    Gateway-owned Northbound API. Invocation v2 returns transient Agent output
    on the invocation request and exposes only metadata through Ledger reads.
servers:
  - url: https://api.nekiro.dev
    description: NeKiro Gateway destination
paths:
  /v2/agents:
    post:
      operationId: registerAgent
      summary: Register an immutable draft Agent Card version
      description: >-
        Registers only an active Agent Card 0.2 document. The authenticated
        caller must equal card.owner.id. The request rejects malformed JSON,
        duplicate members, unknown fields, trailing values, and structural or
        semantic Card violations before persistence. The Gateway reads at most
        16,777,216 body bytes; an oversized request returns the fixed validation
        failure without persistence.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        x-nekiro-max-body-bytes: 16777216
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [card]
              properties:
                card:
                  $ref: ../schemas/agent-card.v0.2.schema.json
      responses:
        "201":
          description: Agent version registered
          headers:
            x-nek-trace-id:
              $ref: "#/components/headers/TraceID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogEntry"
        "400":
          $ref: "#/components/responses/CatalogValidationError"
        "401":
          $ref: "#/components/responses/CatalogUnauthenticated"
        "403":
          $ref: "#/components/responses/CatalogForbidden"
        "409":
          $ref: "#/components/responses/CatalogConflict"
        "503":
          $ref: "#/components/responses/CatalogDependencyError"
    get:
      operationId: searchAgents
      summary: Discover published Agents
      description: >-
        Returns only exact published Agent Card versions. Supplied query,
        capability, and ownerId filters combine with AND. No matches returns an
        explicit empty items array. Draft and disabled versions are excluded.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: query
          description: Literal case-insensitive substring over Card name or description; values are not SQL wildcards.
          schema: { type: string, minLength: 1, maxLength: 256, pattern: "\\S" }
        - in: query
          name: capability
          description: Exact case-sensitive capability identifier.
          schema:
            $ref: ../schemas/common.v1.schema.json#/$defs/capabilityId
        - in: query
          name: ownerId
          description: Exact case-sensitive owner identifier.
          schema:
            $ref: ../schemas/common.v1.schema.json#/$defs/ownerId
        - in: query
          name: limit
          description: Page size. Omission uses the explicit product default of 25; invalid explicit values are rejected.
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
        - in: query
          name: cursor
          description: >-
            Opaque continuation bound to the original normalized filters, page
            size, and first-page publication boundary. Malformed or
            filter-mismatched values are rejected and never restart traversal.
          schema: { type: string, minLength: 1 }
      responses:
        "200":
          description: Matching published Agents
          headers:
            x-nek-trace-id:
              $ref: "#/components/headers/TraceID"
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/CatalogEntry"
                  nextCursor:
                    type: string
                    minLength: 1
        "400":
          $ref: "#/components/responses/CatalogValidationError"
        "401":
          $ref: "#/components/responses/CatalogUnauthenticated"
        "503":
          $ref: "#/components/responses/CatalogDependencyError"
  /v2/agents/{agentId}/versions/{version}:
    get:
      operationId: getAgentVersion
      summary: Read one exact Agent Card version
      description: >-
        Published versions are visible to every authenticated caller. Draft and
        disabled versions are visible only to their immutable owner.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/Version"
      responses:
        "200":
          description: Exact Agent version
          headers:
            x-nek-trace-id:
              $ref: "#/components/headers/TraceID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogEntry"
        "400":
          $ref: "#/components/responses/CatalogValidationError"
        "401":
          $ref: "#/components/responses/CatalogUnauthenticated"
        "403":
          $ref: "#/components/responses/CatalogForbidden"
        "404":
          $ref: "#/components/responses/CatalogNotFound"
        "503":
          $ref: "#/components/responses/CatalogDependencyError"
  /v2/agents/{agentId}/versions/{version}/publish:
    post:
      operationId: publishAgentVersion
      summary: Publish one owned draft Agent Card version
      description: >-
        Only the immutable owner may publish. Publication succeeds exactly once
        from draft and makes the version immediately eligible for Discovery.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/Version"
      responses:
        "200":
          description: Published Agent version
          headers:
            x-nek-trace-id:
              $ref: "#/components/headers/TraceID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogEntry"
        "400":
          $ref: "#/components/responses/CatalogValidationError"
        "401":
          $ref: "#/components/responses/CatalogUnauthenticated"
        "403":
          $ref: "#/components/responses/CatalogForbidden"
        "404":
          $ref: "#/components/responses/CatalogNotFound"
        "409":
          $ref: "#/components/responses/CatalogConflict"
        "503":
          $ref: "#/components/responses/CatalogDependencyError"
  /v2/agents/{agentId}/versions/{version}/disable:
    post:
      operationId: disableAgentVersion
      summary: Disable one owned Agent Card version
      description: >-
        Only the immutable owner may disable a draft or published version.
        Repeating disable returns the unchanged disabled entry as the specified
        idempotent success.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/Version"
      responses:
        "200":
          description: Disabled Agent version
          headers:
            x-nek-trace-id:
              $ref: "#/components/headers/TraceID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogEntry"
        "400":
          $ref: "#/components/responses/CatalogValidationError"
        "401":
          $ref: "#/components/responses/CatalogUnauthenticated"
        "403":
          $ref: "#/components/responses/CatalogForbidden"
        "404":
          $ref: "#/components/responses/CatalogNotFound"
        "503":
          $ref: "#/components/responses/CatalogDependencyError"
  /v2/workspaces/{workspaceId}/installations:
    post:
      operationId: installAgent
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [agentId, versionConstraint, acceptedPermissions]
              properties:
                agentId:
                  $ref: ../schemas/common.v1.schema.json#/$defs/agentId
                versionConstraint:
                  $ref: ../schemas/common.v1.schema.json#/$defs/semverRange
                acceptedPermissions:
                  type: array
                  uniqueItems: true
                  items:
                    $ref: ../schemas/common.v1.schema.json#/$defs/permissionId
      responses:
        "201":
          description: Agent installed in Workspace
          content:
            application/json:
              schema:
                $ref: ../schemas/installation.v1.schema.json
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/ResourceNotFound"
        "409":
          $ref: "#/components/responses/StateConflict"
  /v2/workspaces/{workspaceId}/installations/{installationId}:
    patch:
      operationId: updateInstallation
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/InstallationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [status]
              properties:
                status: { enum: [enabled, disabled] }
      responses:
        "200":
          description: Updated installation
          content:
            application/json:
              schema:
                $ref: ../schemas/installation.v1.schema.json
        "404":
          $ref: "#/components/responses/ResourceNotFound"
    delete:
      operationId: uninstallAgent
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/InstallationId"
      responses:
        "204":
          description: Agent uninstalled
        "404":
          $ref: "#/components/responses/ResourceNotFound"
  /v2/workspaces/{workspaceId}/invocations:
    post:
      operationId: invokeAgent
      summary: Invoke an installed Agent and return its transient result
      description: >-
        This POST is the only Northbound result channel. The request stream
        field and Accept header MUST agree. stream=false requires
        application/json or a compatible wildcard and returns one Invocation
        Result. stream=true requires text/event-stream and returns ordered
        Invocation Result Stream Event data values. A mismatch returns 406
        NOT_ACCEPTABLE. Once SSE is committed, failed, canceled, and timed-out
        outcomes are in-band terminal events. EOF without a terminal event is
        interrupted delivery. A JSON result and every 502, 503, or 504 response
        MUST repeat the exact invocationId, rootTaskId, and traceId from the
        Invocation context created for this request. Results are not persisted
        or replayed.
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/ResultAccept"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvokeAgentRequest"
      responses:
        "200":
          description: Complete JSON result or committed SSE result stream selected by request mode
          content:
            application/json:
              schema:
                $ref: ../schemas/invocation-result.v1.schema.json
            text/event-stream:
              schema:
                type: string
              x-sse-data-schema:
                $ref: ../schemas/invocation-result-stream-event.v1.schema.json
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "406":
          $ref: "#/components/responses/NotAcceptable"
        "409":
          $ref: "#/components/responses/Conflict"
        "502":
          $ref: "#/components/responses/AgentFailure"
        "503":
          $ref: "#/components/responses/Unavailable"
        "504":
          $ref: "#/components/responses/Timeout"
  /v2/invocations/{invocationId}:
    get:
      operationId: getInvocation
      summary: Read an Invocation and metadata-only Ledger facts
      parameters:
        - $ref: "#/components/parameters/InvocationId"
      responses:
        "200":
          description: Invocation projection and append-only facts without Agent input or result content
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [invocation, events]
                properties:
                  invocation:
                    $ref: "#/components/schemas/InvocationRecord"
                  events:
                    type: array
                    items:
                      $ref: ../schemas/invocation-event.v0.2.schema.json
        "404":
          $ref: "#/components/responses/ResourceNotFound"
        "503":
          $ref: "#/components/responses/DependencyUnavailable"
  /v2/traces/{traceId}:
    get:
      operationId: getTrace
      summary: Read metadata-only Invocation lineage
      parameters:
        - in: path
          name: traceId
          required: true
          schema:
            $ref: ../schemas/common.v1.schema.json#/$defs/traceId
      responses:
        "200":
          description: Parent-child Invocation trace without Agent input or result content
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [traceId, invocations]
                properties:
                  traceId:
                    $ref: ../schemas/common.v1.schema.json#/$defs/traceId
                  invocations:
                    type: array
                    items:
                      $ref: "#/components/schemas/InvocationRecord"
        "404":
          $ref: "#/components/responses/ResourceNotFound"
        "503":
          $ref: "#/components/responses/DependencyUnavailable"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: >-
        Gateway-verified bearer credential mapped to one trusted caller ID.
        Public caller-ID headers are not an authentication source.
  headers:
    TraceID:
      description: Gateway-assigned request trace identifier.
      required: true
      schema:
        $ref: ../schemas/common.v1.schema.json#/$defs/traceId
  parameters:
    AgentId:
      in: path
      name: agentId
      required: true
      schema:
        $ref: ../schemas/common.v1.schema.json#/$defs/agentId
    Version:
      in: path
      name: version
      required: true
      schema:
        $ref: ../schemas/common.v1.schema.json#/$defs/semver
    WorkspaceId:
      in: path
      name: workspaceId
      required: true
      schema:
        $ref: ../schemas/common.v1.schema.json#/$defs/workspaceId
    InstallationId:
      in: path
      name: installationId
      required: true
      schema:
        $ref: ../schemas/common.v1.schema.json#/$defs/installationId
    InvocationId:
      in: path
      name: invocationId
      required: true
      schema:
        $ref: ../schemas/common.v1.schema.json#/$defs/invocationId
    ResultAccept:
      in: header
      name: Accept
      required: true
      description: >-
        application/json or a compatible wildcard for stream=false;
        text/event-stream for stream=true.
      schema:
        type: string
        minLength: 1
  responses:
    CatalogValidationError:
      description: Catalog request validation failed
      headers:
        x-nek-trace-id:
          $ref: "#/components/headers/TraceID"
      x-platform-error-codes: [VALIDATION_ERROR]
      content:
        application/json:
          schema:
            $ref: ../schemas/platform-error.v2.schema.json
    CatalogUnauthenticated:
      description: A valid Gateway bearer identity is required
      headers:
        x-nek-trace-id:
          $ref: "#/components/headers/TraceID"
      x-platform-error-codes: [UNAUTHENTICATED]
      content:
        application/json:
          schema:
            $ref: ../schemas/platform-error.v2.schema.json
    CatalogForbidden:
      description: The authenticated caller is not allowed to perform this Catalog operation
      headers:
        x-nek-trace-id:
          $ref: "#/components/headers/TraceID"
      x-platform-error-codes: [FORBIDDEN]
      content:
        application/json:
          schema:
            $ref: ../schemas/platform-error.v2.schema.json
    CatalogNotFound:
      description: The exact Agent Card version does not exist
      headers:
        x-nek-trace-id:
          $ref: "#/components/headers/TraceID"
      x-platform-error-codes: [NOT_FOUND]
      content:
        application/json:
          schema:
            $ref: ../schemas/platform-error.v2.schema.json
    CatalogConflict:
      description: The exact version already exists or the requested lifecycle transition is illegal
      headers:
        x-nek-trace-id:
          $ref: "#/components/headers/TraceID"
      x-platform-error-codes: [CONFLICT]
      content:
        application/json:
          schema:
            $ref: ../schemas/platform-error.v2.schema.json
    CatalogDependencyError:
      description: The Catalog persistence dependency could not complete the operation
      headers:
        x-nek-trace-id:
          $ref: "#/components/headers/TraceID"
      x-platform-error-codes: [DEPENDENCY_ERROR]
      content:
        application/json:
          schema:
            $ref: ../schemas/platform-error.v2.schema.json
    ResourceNotFound:
      description: Requested resource was not found
      x-platform-error-codes: [NOT_FOUND]
      content:
        application/json:
          schema:
            $ref: ../schemas/platform-error.v2.schema.json
    StateConflict:
      description: Requested operation conflicts with current state
      x-platform-error-codes: [CONFLICT]
      content:
        application/json:
          schema:
            $ref: ../schemas/platform-error.v2.schema.json
    DependencyUnavailable:
      description: A required platform dependency failed
      x-platform-error-codes: [DEPENDENCY_ERROR]
      content:
        application/json:
          schema:
            $ref: ../schemas/platform-error.v2.schema.json
    BadRequest:
      description: Invalid request
      x-platform-error-codes: [VALIDATION_ERROR]
      content:
        application/json:
          schema:
            $ref: ../schemas/platform-error.v2.schema.json
    Unauthenticated:
      description: Authentication is required
      x-platform-error-codes: [UNAUTHENTICATED]
      content:
        application/json:
          schema:
            $ref: ../schemas/platform-error.v2.schema.json
    Forbidden:
      description: Installation or capability is not authorized
      x-platform-error-codes: [FORBIDDEN, AGENT_DISABLED, CAPABILITY_NOT_ALLOWED]
      content:
        application/json:
          schema:
            $ref: ../schemas/platform-error.v2.schema.json
    NotFound:
      description: Requested Agent or Installation was not found
      x-platform-error-codes: [NOT_FOUND, AGENT_NOT_INSTALLED]
      content:
        application/json:
          schema:
            $ref: ../schemas/platform-error.v2.schema.json
    NotAcceptable:
      description: Request result mode and Accept header do not agree
      x-platform-error-codes: [NOT_ACCEPTABLE]
      content:
        application/json:
          schema:
            $ref: ../schemas/platform-error.v2.schema.json
    Conflict:
      description: Invocation was canceled or conflicts with current state before response commitment
      x-platform-error-codes: [CONFLICT, CANCELED]
      content:
        application/json:
          schema:
            $ref: ../schemas/platform-error.v2.schema.json
    AgentFailure:
      description: Agent execution or A2A protocol failed before response commitment
      x-platform-error-codes: [AGENT_EXECUTION_FAILED, A2A_PROTOCOL_ERROR]
      x-platform-error-correlation:
        source: created-invocation-context
        exactFields: [invocationId, rootTaskId, traceId]
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CorrelatedPlatformError"
    Unavailable:
      description: Route, Agent, or required dependency is unavailable
      x-platform-error-codes: [ROUTE_NOT_FOUND, AGENT_UNAVAILABLE, DEPENDENCY_ERROR]
      x-platform-error-correlation:
        source: created-invocation-context
        exactFields: [invocationId, rootTaskId, traceId]
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CorrelatedPlatformError"
    Timeout:
      description: Invocation deadline expired before response commitment
      x-platform-error-codes: [TIMEOUT]
      x-platform-error-correlation:
        source: created-invocation-context
        exactFields: [invocationId, rootTaskId, traceId]
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CorrelatedPlatformError"
  schemas:
    CorrelatedPlatformError:
      allOf:
        - $ref: ../schemas/platform-error.v2.schema.json
        - type: object
          required: [invocationId, rootTaskId, traceId]
    CatalogEntry:
      type: object
      additionalProperties: false
      required: [card, publicationStatus, registeredAt]
      properties:
        card:
          $ref: ../schemas/agent-card.v0.2.schema.json
        publicationStatus:
          enum: [draft, published, disabled]
        registeredAt:
          $ref: ../schemas/common.v1.schema.json#/$defs/dateTime
        publishedAt:
          $ref: ../schemas/common.v1.schema.json#/$defs/dateTime
    InvokeAgentRequest:
      type: object
      additionalProperties: false
      required: [agentId, capability, input, stream]
      properties:
        agentId:
          $ref: ../schemas/common.v1.schema.json#/$defs/agentId
        capability:
          $ref: ../schemas/common.v1.schema.json#/$defs/capabilityId
        input:
          $ref: ../schemas/common.v1.schema.json#/$defs/jsonObject
        stream:
          type: boolean
    InvocationRecord:
      type: object
      additionalProperties: false
      required: [invocationId, rootTaskId, traceId, caller, workspaceId, targetAgentId, agentCardVersion, capability, status, createdAt, updatedAt]
      properties:
        invocationId:
          $ref: ../schemas/common.v1.schema.json#/$defs/invocationId
        rootTaskId:
          $ref: ../schemas/common.v1.schema.json#/$defs/taskId
        parentInvocationId:
          $ref: ../schemas/common.v1.schema.json#/$defs/invocationId
        traceId:
          $ref: ../schemas/common.v1.schema.json#/$defs/traceId
        caller:
          $ref: ../schemas/common.v1.schema.json#/$defs/caller
        workspaceId:
          $ref: ../schemas/common.v1.schema.json#/$defs/workspaceId
        targetAgentId:
          $ref: ../schemas/common.v1.schema.json#/$defs/agentId
        agentCardVersion:
          $ref: ../schemas/common.v1.schema.json#/$defs/semver
        capability:
          $ref: ../schemas/common.v1.schema.json#/$defs/capabilityId
        status:
          enum: [pending, routing, running, succeeded, failed, canceled, timed_out]
        latencyMs:
          type: integer
          minimum: 0
        errorCode:
          $ref: ../schemas/platform-error.v2.schema.json#/properties/code
        createdAt:
          $ref: ../schemas/common.v1.schema.json#/$defs/dateTime
        updatedAt:
          $ref: ../schemas/common.v1.schema.json#/$defs/dateTime
