openapi: 3.1.0
info:
  title: NeKiro Northbound Invocation API
  version: 4.0.0
  description: >-
    Invocation-only Northbound target. Catalog, Workspace, and Installation
    remain served from control-plane.v3.yaml; this document is not a complete
    Control Plane v4 replacement and defines no second fact for those domains.
    Clients use the same Gateway destination and select v4 only for Invocation
    create/metadata routes.
servers:
  - url: https://api.nekiro.dev
    description: Existing Gateway destination
paths:
  /v4/workspaces/{workspaceId}/invocations:
    post:
      operationId: invokeAgentV4
      summary: Invoke an installed Agent through Dispatch and Router
      description: >-
        Gateway authenticates the caller, strictly validates media and the
        required configured public body bound, generates root correlation, and
        dispatches only to Router Internal v3. Successful Router created-event
        commit is acceptance. Before it, failures create no Ledger fact. Clean
        success follows terminal Ledger commit. After an Agent side effect,
        Ledger persistence loss is explicit DEPENDENCY_ERROR and leaves only
        committed non-terminal metadata; no retry or fabricated terminal occurs.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/ResultAccept"
      requestBody:
        required: true
        x-nekiro-max-body-bytes-source: required-gateway-invocation-request-limit
        x-nekiro-limit-default: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InvokeAgentRequest" }
      responses:
        "200":
          description: JSON success or live SSE result
          content:
            application/json: { schema: { $ref: ../schemas/invocation-result.v1.schema.json } }
            text/event-stream:
              schema: { type: string }
              x-sse-data-schema: { $ref: ../schemas/invocation-result-stream-event.v2.schema.json }
              x-nekiro-sse-framing: single-data-line-blank-line-flush
              x-nekiro-max-event-bytes-source: required-gateway-sse-event-limit
              x-nekiro-limit-default: false
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "406": { $ref: "#/components/responses/NotAcceptable" }
        "409": { $ref: "#/components/responses/Conflict" }
        "413": { $ref: "#/components/responses/PayloadTooLarge" }
        "502": { $ref: "#/components/responses/AgentFailure" }
        "503": { $ref: "#/components/responses/Unavailable" }
        "504": { $ref: "#/components/responses/Timeout" }
  /v4/invocations/{invocationId}:
    get:
      operationId: getInvocationV4
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/InvocationId" }]
      responses:
        "200":
          description: Metadata-only facts; a last non-terminal status is returned unchanged and is not inferred as success/failure
          content:
            application/json:
              schema: { type: array, items: { $ref: ../schemas/invocation-event.v0.3.schema.json } }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/Unavailable" }
  /v4/traces/{traceId}:
    get:
      operationId: getTraceV4
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: traceId
          required: true
          schema: { $ref: ../schemas/common.v1.schema.json#/$defs/traceId }
      responses:
        "200":
          description: Workspace-authorized metadata-only trace facts
          content:
            application/json:
              schema: { type: array, items: { $ref: ../schemas/invocation-event.v0.3.schema.json } }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/Unavailable" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: Gateway-verified caller identity; public identity headers are not trusted.
  parameters:
    WorkspaceId:
      in: path
      name: workspaceId
      required: true
      schema: { $ref: ../schemas/common.v1.schema.json#/$defs/workspaceId }
    InvocationId:
      in: path
      name: invocationId
      required: true
      schema: { $ref: ../schemas/common.v1.schema.json#/$defs/invocationId }
    ResultAccept:
      in: header
      name: Accept
      required: true
      schema: { type: string, minLength: 1 }
  schemas:
    InvokeAgentRequest:
      type: object
      additionalProperties: false
      required: [agentId, capability, input, stream]
      properties:
        agentId: { $ref: ../schemas/common.v1.schema.json#/$defs/agentId }
        capability: { $ref: ../schemas/common.v1.schema.json#/$defs/capabilityId }
        input: { $ref: ../schemas/common.v1.schema.json#/$defs/jsonObject }
        stream: { type: boolean }
  responses:
    BadRequest: { description: Invalid request, x-platform-error-codes: [VALIDATION_ERROR], content: { application/json: { schema: { $ref: ../schemas/platform-error.v4.schema.json } } } }
    Unauthenticated: { description: Authentication required, x-platform-error-codes: [UNAUTHENTICATED], content: { application/json: { schema: { $ref: ../schemas/platform-error.v4.schema.json } } } }
    Forbidden: { description: Workspace/capability forbidden, x-platform-error-codes: [FORBIDDEN, CAPABILITY_NOT_ALLOWED], content: { application/json: { schema: { $ref: ../schemas/platform-error.v4.schema.json } } } }
    NotFound: { description: Workspace/installation/resource not found, x-platform-error-codes: [NOT_FOUND, AGENT_NOT_INSTALLED], content: { application/json: { schema: { $ref: ../schemas/platform-error.v4.schema.json } } } }
    NotAcceptable: { description: stream and Accept disagree, x-platform-error-codes: [NOT_ACCEPTABLE], content: { application/json: { schema: { $ref: ../schemas/platform-error.v4.schema.json } } } }
    Conflict: { description: Disabled/canceled/conflicting state, x-platform-error-codes: [CONFLICT, INSTALLATION_DISABLED, AGENT_DISABLED, CANCELED], content: { application/json: { schema: { $ref: ../schemas/platform-error.v4.schema.json } } } }
    PayloadTooLarge: { description: Public request exceeds required configured limit before acceptance, x-platform-error-codes: [PAYLOAD_TOO_LARGE], content: { application/json: { schema: { $ref: ../schemas/platform-error.v4.schema.json } } } }
    AgentFailure: { description: Exact Agent/protocol/auth failure, x-platform-error-codes: [AGENT_AUTH_UNSUPPORTED, AGENT_EXECUTION_FAILED, A2A_PROTOCOL_ERROR], content: { application/json: { schema: { $ref: ../schemas/platform-error.v4.schema.json } } } }
    Unavailable: { description: Route/Agent/dependency unavailable, x-platform-error-codes: [ROUTE_NOT_FOUND, AGENT_UNAVAILABLE, DEPENDENCY_ERROR], content: { application/json: { schema: { $ref: ../schemas/platform-error.v4.schema.json } } } }
    Timeout: { description: Effective deadline expired, x-platform-error-codes: [TIMEOUT], content: { application/json: { schema: { $ref: ../schemas/platform-error.v4.schema.json } } } }
